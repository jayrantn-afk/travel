<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner | 旅遊規劃秘書</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/zh-tw.js"></script>

  <style>
    :root {
      --primary: #0ea5e9; --primary-hover: #0284c7; --danger: #ef4444; 
      --bg-color: #f1f5f9; --surface: #ffffff; --text-main: #0f172a; 
      --text-muted: #64748b; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; padding-bottom: 40px;}

    .view { display: none; min-height: 100vh; padding: 20px; max-width: 800px; margin: 0 auto; }
    .view.active { display: block; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 共用元件 */
    .btn { padding: 10px 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-small { padding: 6px 12px; font-size: 14px; }
    .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .form-control { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 10px;}
    .flex-row { display: flex; gap: 10px; align-items: center; }

    /* 登入與儀表板 */
    .login-container { margin: 10vh auto; background: var(--surface); padding: 30px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .app-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 20px;}
    .projects-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .project-card { position: relative; background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; transition: 0.2s;}
    .project-card:hover { border-color: var(--primary); }
    .delete-btn { position: absolute; top: 10px; right: 10px; background: #fee2e2; color: var(--danger); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-weight: bold;}
    
    /* 專案詳情與 Tabs */
    .detail-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: var(--surface); padding: 15px; border-radius: var(--radius); box-shadow: var(--shadow);}
    .tabs { display: flex; background: var(--surface); border-radius: var(--radius); padding: 5px; box-shadow: var(--shadow); overflow-x: auto; margin-bottom: 20px;}
    .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: 600; color: var(--text-muted); white-space: nowrap; min-width: 80px;}
    .tab.active { background: var(--primary); color: white; }
    
    .module-content { display: none; }
    .module-content.active { display: block; animation: fadeIn 0.2s; }

    /* 模組內部共用 UI */
    .card-panel { background: var(--surface); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 15px; }
    .list-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
    .list-item:last-child { border-bottom: none; }
    .item-title { font-weight: bold; font-size: 16px; color: var(--text-main);}
    .item-sub { font-size: 14px; color: var(--text-muted); }
    .del-text { color: var(--danger); cursor: pointer; font-size: 14px; font-weight: bold;}

    /* 行程專用 */
    .day-selector { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px;}
    .day-btn { padding: 8px 16px; border-radius: 20px; background: var(--border); border: none; cursor: pointer; white-space: nowrap;}
    .day-btn.active { background: var(--primary); color: white; }
    .time-badge { background: #e0f2fe; color: var(--primary-hover); padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 14px;}

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 90%; max-width: 400px; padding: 25px; border-radius: var(--radius); }
  </style>
</head>
<body>

  <div id="login-view" class="view active">
    <div class="login-container">
      <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">✈️ 旅遊規劃秘書</h2>
      <select id="user-select" class="form-control">
        <optgroup label="家族帳號"><option value="魏嘉宏">魏嘉宏</option><option value="魏卉姍">魏卉姍</option><option value="魏敏軒">魏敏軒</option><option value="魏珮芯">魏珮芯</option></optgroup>
        <optgroup label="獨立專案"><option value="陳筱雙">陳筱雙</option></optgroup>
      </select>
      <input type="password" id="password-input" class="form-control" placeholder="請輸入密碼 (35195 或 1206)">
      <button class="btn" style="width: 100%;" onclick="handleLogin()">登入</button>
    </div>
  </div>

  <div id="dashboard-view" class="view">
    <div class="app-header">
      <h3>👋 歡迎，<span id="display-name"></span></h3>
      <button class="btn btn-outline btn-small" onclick="handleLogout()">登出</button>
    </div>
    <div class="projects-container" id="projects-grid"></div>
  </div>

  <div id="detail-view" class="view">
    <div class="detail-header">
      <button class="btn btn-outline btn-small" onclick="switchView('dashboard-view')">← 返回</button>
      <h3 id="project-title-display" style="flex:1; margin:0; font-size:18px;">載入中...</h3>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('itinerary')">📅 行程</div>
      <div class="tab" onclick="switchTab('map')">🗺️ 地圖</div>
      <div class="tab" onclick="switchTab('hotel')">🏨 住宿</div>
      <div class="tab" onclick="switchTab('budget')">💰 記帳</div>
    </div>

    <div id="tab-itinerary" class="module-content active">
      <div class="day-selector" id="day-buttons"></div>
      <div class="card-panel">
        <div class="flex-row" style="margin-bottom: 15px;">
          <input type="time" id="plan-time" class="form-control" style="width: auto; margin: 0;">
          <input type="text" id="plan-place" class="form-control" placeholder="輸入景點/活動名稱" style="margin: 0;">
          <button class="btn" onclick="addPlan()">新增</button>
        </div>
        <div id="plan-list"></div>
      </div>
    </div>

    <div id="tab-map" class="module-content">
      <div class="card-panel" style="padding: 0; overflow: hidden; height: 60vh;">
        <iframe id="map-iframe" width="100%" height="100%" style="border:0;" loading="lazy"></iframe>
      </div>
    </div>

    <div id="tab-hotel" class="module-content">
      <div class="card-panel">
        <h4>新增住宿</h4>
        <input type="text" id="hotel-name" class="form-control" placeholder="飯店名稱">
        <input type="text" id="hotel-date" class="form-control" placeholder="入住日期 ~ 退房日期">
        <button class="btn" style="width: 100%;" onclick="addHotel()">儲存住宿</button>
      </div>
      <div class="card-panel" id="hotel-list"></div>
    </div>

    <div id="tab-budget" class="module-content">
      <div class="card-panel" style="background: var(--primary); color: white;">
        <h3 style="margin:0; font-size: 16px; opacity: 0.9;">總花費 (TWD)</h3>
        <h1 style="margin:0; font-size: 32px;" id="total-expense">0</h1>
      </div>
      <div class="card-panel">
        <div class="flex-row">
          <input type="text" id="exp-item" class="form-control" placeholder="項目 (如: 晚餐)" style="flex:2; margin:0;">
          <input type="number" id="exp-cost" class="form-control" placeholder="金額" style="flex:1; margin:0;">
        </div>
        <div class="flex-row" style="margin-top: 10px;">
          <input type="text" id="exp-payer" class="form-control" placeholder="代墊人 (預設自己)" style="margin:0;">
          <button class="btn" onclick="addExpense()">記一筆</button>
        </div>
      </div>
      <div class="card-panel" id="expense-list"></div>
    </div>
  </div>

  <div id="add-modal" class="modal-overlay">
    <div class="modal">
      <h2>✨ 新增旅遊計畫</h2>
      <input type="text" id="trip-location" class="form-control" placeholder="旅遊地點 (如: 京都)">
      <input type="text" id="trip-date-range" class="form-control" placeholder="點擊選擇日期區間" readonly>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">取消</button>
        <button class="btn" style="flex:1;" onclick="createProject()">建立</button>
      </div>
    </div>
  </div>

  <script>
    // --- 核心變數與資料初始化 ---
    let currentUser = null;
    let currentWorkspace = null;
    let currentProjectId = null;
    let activeDayIndex = 0; // 行程表目前選擇的第幾天

    const authRules = {
      '魏嘉宏': { pwd: '35195', ws: 'wei_family' }, '魏卉姍': { pwd: '35195', ws: 'wei_family' },
      '魏敏軒': { pwd: '35195', ws: 'wei_family' }, '魏珮芯': { pwd: '35195', ws: 'wei_family' },
      '陳筱雙': { pwd: '1206', ws: 'chen_project' }
    };

    flatpickr("#trip-date-range", { mode: "range", minDate: "today", locale: "zh_tw" });
    flatpickr("#hotel-date", { mode: "range", locale: "zh_tw" });

    // --- 畫面切換與登入 ---
    function switchView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.module-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      if(tabId === 'map') renderMap(); // 確保切換到地圖時重新載入 iframe
    }

    function handleLogin() {
      const user = document.getElementById('user-select').value;
      const pwd = document.getElementById('password-input').value;
      if (authRules[user].pwd === pwd) {
        currentUser = user; currentWorkspace = authRules[user].ws;
        document.getElementById('display-name').textContent = currentUser;
        document.getElementById('password-input').value = '';
        renderDashboard(); switchView('dashboard-view');
      } else alert("密碼錯誤！");
    }

    function handleLogout() { currentUser = null; currentWorkspace = null; switchView('login-view'); }

    // --- 資料庫操作 (LocalStorage) ---
    function getDB() { return JSON.parse(localStorage.getItem(`app_${currentWorkspace}`) || '[]'); }
    function saveDB(data) { localStorage.setItem(`app_${currentWorkspace}`, JSON.stringify(data)); }
    function getCurProject() { return getDB().find(p => p.id === currentProjectId); }
    function updateCurProject(updatedProject) {
      const db = getDB();
      const idx = db.findIndex(p => p.id === currentProjectId);
      db[idx] = updatedProject;
      saveDB(db);
    }

    // --- 儀表板與專案管理 ---
    function openModal() { document.getElementById('add-modal').classList.add('active'); }
    function closeModal() { document.getElementById('add-modal').classList.remove('active'); }

    function createProject() {
      const loc = document.getElementById('trip-location').value;
      const dates = document.getElementById('trip-date-range').value.split(' to ');
      if(!loc || dates.length !== 2) return alert("請填完整地點與日期區間！");
      
      const db = getDB();
      db.push({
        id: Date.now(), location: loc, start: dates[0], end: dates[1], creator: currentUser,
        plans: [], hotels: [], expenses: [] // 建立真實資料結構
      });
      saveDB(db); closeModal(); renderDashboard();
    }

    function delProject(id, e) {
      e.stopPropagation();
      if(confirm("確定刪除此專案？")) { saveDB(getDB().filter(p => p.id !== id)); renderDashboard(); }
    }

    function renderDashboard() {
      const grid = document.getElementById('projects-grid');
      const db = getDB();
      grid.innerHTML = `<div class="project-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; border: 2px dashed var(--border); box-shadow:none; color: var(--text-muted);" onclick="openModal()"><h1 style="margin:0; font-weight:300;">+</h1><p>新增旅遊計畫</p></div>`;
      
      db.slice().reverse().forEach(p => {
        grid.innerHTML += `
          <div class="project-card" onclick="openProject(${p.id})">
            <button class="delete-btn" onclick="delProject(${p.id}, event)">×</button>
            <h3 style="margin-bottom: 5px;">📍 ${p.location}</h3>
            <p style="font-size: 14px; color: var(--text-muted);">📅 ${p.start} ~ ${p.end}</p>
            <span style="font-size: 12px; background: var(--bg-color); padding: 2px 6px; border-radius: 4px; color: var(--primary);">👤 ${p.creator}</span>
          </div>`;
      });
    }

    // --- 專案詳情與四大模組實作 ---
    function openProject(id) {
      currentProjectId = id;
      activeDayIndex = 0;
      const p = getCurProject();
      document.getElementById('project-title-display').textContent = `📍 ${p.location}`;
      
      // 初始化模組
      document.querySelector('.tab').click(); // 預設點擊第一個 Tab (行程)
      renderItinerary();
      renderHotels();
      renderBudget();
      switchView('detail-view');
    }

    // 模組 1: 行程
    function getDaysDiff(start, end) {
      const ms = new Date(end) - new Date(start);
      return Math.floor(ms / (1000 * 60 * 60 * 24)) + 1;
    }

    function renderItinerary() {
      const p = getCurProject();
      const totalDays = getDaysDiff(p.start, p.end);
      
      // 生成天數按鈕
      let daysHtml = '';
      for(let i=0; i<totalDays; i++) {
        let d = new Date(p.start); d.setDate(d.getDate() + i);
        let dateStr = `${d.getMonth()+1}/${d.getDate()}`;
        daysHtml += `<button class="day-btn ${i === activeDayIndex ? 'active' : ''}" onclick="changeDay(${i})">Day ${i+1} (${dateStr})</button>`;
      }
      document.getElementById('day-buttons').innerHTML = daysHtml;

      // 渲染當天行程
      const list = document.getElementById('plan-list');
      const dayPlans = p.plans.filter(plan => plan.dayIdx === activeDayIndex).sort((a,b) => a.time.localeCompare(b.time));
      
      if(dayPlans.length === 0) {
        list.innerHTML = `<p style="text-align:center; color: var(--text-muted); padding: 20px 0;">尚無行程，從上方新增吧！</p>`;
      } else {
        list.innerHTML = dayPlans.map(plan => `
          <div class="list-item">
            <div class="flex-row"><span class="time-badge">${plan.time}</span> <span class="item-title">${plan.place}</span></div>
            <span class="del-text" onclick="delPlan(${plan.id})">刪除</span>
          </div>
        `).join('');
      }
    }

    function changeDay(idx) { activeDayIndex = idx; renderItinerary(); }

    function addPlan() {
      const time = document.getElementById('plan-time').value;
      const place = document.getElementById('plan-place').value;
      if(!time || !place) return alert("請輸入時間與景點！");
      
      const p = getCurProject();
      p.plans.push({ id: Date.now(), dayIdx: activeDayIndex, time, place });
      updateCurProject(p);
      
      document.getElementById('plan-time').value = ''; document.getElementById('plan-place').value = '';
      renderItinerary();
    }
    
    function delPlan(planId) {
      const p = getCurProject();
      p.plans = p.plans.filter(plan => plan.id !== planId);
      updateCurProject(p); renderItinerary();
    }

    // 模組 2: 地圖
    function renderMap() {
      const p = getCurProject();
      // 使用 Google Maps 的 embed 參數，免 API Key 即可搜尋地點
      const mapUrl = `https://maps.google.com/maps?q=${encodeURIComponent(p.location)}&t=m&z=13&output=embed&iwloc=near`;
      document.getElementById('map-iframe').src = mapUrl;
    }

    // 模組 3: 住宿
    function renderHotels() {
      const p = getCurProject();
      const list = document.getElementById('hotel-list');
      if(p.hotels.length === 0) list.innerHTML = `<p style="text-align:center; color: var(--text-muted);">尚未預訂住宿。</p>`;
      else {
        list.innerHTML = p.hotels.map(h => `
          <div class="list-item">
            <div><div class="item-title">🏨 ${h.name}</div><div class="item-sub">日期: ${h.dates}</div></div>
            <span class="del-text" onclick="delHotel(${h.id})">刪除</span>
          </div>
        `).join('');
      }
    }

    function addHotel() {
      const name = document.getElementById('hotel-name').value;
      const dates = document.getElementById('hotel-date').value;
      if(!name || !dates) return alert("請輸入飯店名稱與日期");
      const p = getCurProject();
      p.hotels.push({ id: Date.now(), name, dates });
      updateCurProject(p);
      document.getElementById('hotel-name').value = '';
      renderHotels();
    }

    function delHotel(hId) {
       const p = getCurProject(); p.hotels = p.hotels.filter(h => h.id !== hId); updateCurProject(p); renderHotels();
    }

    // 模組 4: 記帳
    function renderBudget() {
      const p = getCurProject();
      const list = document.getElementById('expense-list');
      let total = 0;
      
      if(p.expenses.length === 0) list.innerHTML = `<p style="text-align:center; color: var(--text-muted);">目前無花費紀錄。</p>`;
      else {
        let html = '';
        p.expenses.forEach(e => {
          total += Number(e.cost);
          html += `
            <div class="list-item">
              <div><div class="item-title">${e.item}</div><div class="item-sub">代墊: ${e.payer}</div></div>
              <div class="flex-row"><span style="font-weight:bold; color:var(--text-main);">$${e.cost}</span> <span class="del-text" onclick="delExpense(${e.id})">×</span></div>
            </div>`;
        });
        list.innerHTML = html;
      }
      document.getElementById('total-expense').textContent = total.toLocaleString();
    }

    function addExpense() {
      const item = document.getElementById('exp-item').value;
      const cost = document.getElementById('exp-cost').value;
      const payer = document.getElementById('exp-payer').value || currentUser; // 沒填預設自己代墊
      if(!item || !cost) return alert("請輸入花費項目與金額");
      
      const p = getCurProject();
      p.expenses.push({ id: Date.now(), item, cost, payer });
      updateCurProject(p);
      document.getElementById('exp-item').value = ''; document.getElementById('exp-cost').value = '';
      renderBudget();
    }

    function delExpense(eId) {
      const p = getCurProject(); p.expenses = p.expenses.filter(e => e.id !== eId); updateCurProject(p); renderBudget();
    }
  </script>
</body>
</html>
