<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家族旅遊秘書</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅遊秘書">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    :root {
      --primary: #FF5A5F; --primary-hover: #E35156; --secondary: #00A699; --danger: #ff3b30; 
      --bg-color: #F7F9FC; --surface: #ffffff; --text-main: #222222; --text-muted: #717171; 
      --border: #EBEBEB; --shadow: rgba(0, 0, 0, 0.08) 0px 4px 12px; --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding-bottom: 60px; }
    
    .view { display: none; min-height: 100vh; padding: 20px; max-width: 600px; margin: 0 auto; }
    .view.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .btn { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .btn-small { padding: 8px 14px; font-size: 13px; border-radius: 8px; }
    .btn-action { background: var(--secondary); }
    .form-control { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; margin-bottom: 12px; }
    
    .card-panel { background: var(--surface); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }
    .flex-row { display: flex; gap: 10px; align-items: center; }

    /* 頁籤與滑動優化 */
    .tabs-wrapper, .day-selector { margin: 0 -20px 20px -20px; padding: 0 20px 10px 20px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .tabs { display: inline-flex; background: #eceff1; border-radius: 14px; padding: 4px; }
    .tab { padding: 10px 20px; cursor: pointer; border-radius: 10px; font-weight: 600; color: var(--text-muted); font-size: 14px; }
    .tab.active { background: var(--surface); color: var(--text-main); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    
    /* 修正紅點標籤 UI */
    .day-btn { display: inline-flex; align-items: center; padding: 10px 16px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; margin-right: 8px; font-weight: 600; color: var(--text-muted); }
    .day-btn.active { background: var(--text-main); color: white; border-color: var(--text-main); }
    .day-badge { background: var(--danger); color: white; border-radius: 12px; padding: 2px 6px; font-size: 10px; margin-left: 6px; }
    
    .time-badge { background: #e8f4fd; color: #0284c7; padding: 6px 10px; border-radius: 8px; font-weight: 700; font-size: 14px; }
    .creator-badge { font-size: 11px; background: #f1f5f9; color: var(--text-muted); padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
    .list-item { padding: 16px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
    .del-text { color: var(--danger); cursor: pointer; font-size: 13px; font-weight: 600; background: #fff0f0; padding: 4px 8px; border-radius: 6px; }

    #sync-status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; display: none; z-index: 9999; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(3px); }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 92%; max-width: 400px; padding: 25px; border-radius: 24px; }
  </style>
</head>
<body>

  <div id="sync-status">☁️ 資料同步中...</div>

  <div id="login-view" class="view active">
    <div style="margin-top: 15vh; text-align: center;">
      <h1 style="margin-bottom: 30px; font-weight: 800;">家族旅遊秘書</h1>
      <div class="card-panel" style="text-align: left;">
        <select id="user-select" class="form-control">
          <option value="魏嘉宏">魏嘉宏</option><option value="魏卉姍">魏卉姍</option>
          <option value="魏敏軒">魏敏軒</option><option value="魏珮芯">魏珮芯</option>
          <option value="陳筱雙">陳筱雙</option>
        </select>
        <input type="password" id="password-input" class="form-control" placeholder="請輸入密碼">
        <button class="btn" style="width: 100%;" onclick="handleLogin()">進入系統</button>
      </div>
    </div>
  </div>

  <div id="dashboard-view" class="view">
    <div class="app-header">
      <h3>👋 <span id="display-name"></span></h3>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-action btn-small" onclick="openInstallModal()">📱 加到桌面</button>
        <button class="btn btn-outline btn-small" onclick="handleLogout()">登出</button>
      </div>
    </div>
    <div class="projects-container" id="projects-grid" style="margin-top: 20px;"></div>
  </div>

  <div id="detail-view" class="view">
    <div class="detail-header">
      <button class="btn btn-outline btn-small" onclick="switchView('dashboard-view')" style="margin-bottom: 10px;">← 返回</button>
      <h2 id="project-title-display">載入中...</h2>
    </div>
    
    <div class="tabs-wrapper">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('itinerary')">📅 行程</div>
        <div class="tab" onclick="switchTab('contacts')">📞 聯絡電話</div>
        <div class="tab" onclick="switchTab('budget')">💰 分帳</div>
        <div class="tab" onclick="switchTab('poll')">🗳️ 投票</div>
        <div class="tab" onclick="switchTab('notes')">📝 記事</div>
      </div>
    </div>

    <div id="tab-itinerary" class="module-content active">
      <div class="day-selector" id="day-buttons"></div>
      <div class="card-panel">
        <div class="flex-row">
          <input type="time" id="plan-time" class="form-control" style="flex: 1; margin: 0;" value="09:00">
          <input type="text" id="plan-place" class="form-control" style="flex: 2; margin: 0;" placeholder="景點名稱">
        </div>
        <button class="btn btn-action" style="width: 100%; margin-top: 10px;" onclick="addPlan()">加入行程</button>
      </div>
      <div id="plan-list"></div>
    </div>

    <div id="tab-contacts" class="module-content">
      <div class="card-panel">
        <input type="text" id="contact-name" class="form-control" placeholder="名稱">
        <input type="tel" id="contact-phone" class="form-control" placeholder="電話號碼">
        <button class="btn btn-action" style="width: 100%;" onclick="addContact()">新增聯絡人</button>
      </div>
      <div id="contacts-list"></div>
    </div>

    <div id="tab-budget" class="module-content">
      <div class="card-panel" style="background: var(--primary); color: white;">
        <div style="font-size: 14px;">旅程總花費</div>
        <div style="font-size: 32px; font-weight: 800;" id="total-expense">0</div>
      </div>
      <div class="card-panel">
        <input type="text" id="exp-item" class="form-control" placeholder="項目">
        <input type="number" id="exp-cost" class="form-control" placeholder="金額">
        <select id="exp-payer" class="form-control"></select>
        <button class="btn btn-action" style="width: 100%;" onclick="addExpense()">記一筆</button>
      </div>
      <div id="expense-list"></div>
      <div class="card-panel" id="split-bill-advice" style="display: none; border: 2px solid var(--secondary);"></div>
    </div>
  </div>

  <div id="install-modal" class="modal-overlay">
    <div class="modal">
      <h2 style="text-align: center; margin-bottom: 15px;">📱 加到主畫面</h2>
      <div style="background: #f8f9fa; padding: 15px; border-radius: 12px; font-size: 14px;">
        <strong>🍎 iPhone 用戶：</strong><br>
        1. 點螢幕下方的「分享圖示」 (正方形箭頭向上)<br>
        2. 往下拖曳，選擇 <strong>「加入主畫面」</strong><br>
        3. 點擊右上角「新增」即可！
      </div>
      <button class="btn" style="width: 100%; margin-top: 20px;" onclick="closeInstallModal()">我了解了</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzXyfuSTyLZXBTQqcMjHglTu00nH2hua6uYKXNQWUbZB1BneeYGu52T56KFUCgJvR0/exec"; 
    
    let currentUser = null; let currentWorkspace = null; let currentProjectId = null; let activeDayIndex = 0;
    const authRules = { '魏嘉宏': '35195', '魏卉姍': '35195', '魏敏軒': '35195', '魏珮芯': '35195', '陳筱雙': '1206' };
    const wsMap = { '陳筱雙': 'chen_project' };

    function showSync() { document.getElementById('sync-status').style.display = 'block'; setTimeout(()=> document.getElementById('sync-status').style.display = 'none', 1500); }

    function syncFromCloud() {
      fetch(`${GAS_URL}?action=get&workspace=${currentWorkspace}`)
        .then(res => res.json())
        .then(data => {
            if(Array.isArray(data)) {
              localStorage.setItem(`app_${currentWorkspace}`, JSON.stringify(data));
              if(currentProjectId) { renderItinerary(); renderBudget(); renderContacts(); }
              renderDashboard();
              showSync();
            }
        });
    }

    function saveDB(data) { 
      localStorage.setItem(`app_${currentWorkspace}`, JSON.stringify(data)); 
      const fd = new URLSearchParams();
      fd.append('action', 'save');
      fd.append('workspace', currentWorkspace);
      fd.append('data', JSON.stringify(data));
      fetch(GAS_URL, { method: 'POST', body: fd.toString(), headers: { 'Content-Type': 'application/x-www-form-urlencoded' } }).then(showSync);
    }

    function getDB() { return JSON.parse(localStorage.getItem(`app_${currentWorkspace}`) || '[]'); }
    function getCurProject() { return getDB().find(p => p.id === currentProjectId) || {}; }
    function updateCurProject(updatedP) { const db = getDB(); db[db.findIndex(p => p.id === currentProjectId)] = updatedP; saveDB(db); }

    function handleLogin() {
      const u = document.getElementById('user-select').value; const p = document.getElementById('password-input').value;
      if (authRules[u] === p) {
        currentUser = u; currentWorkspace = wsMap[u] || 'wei_family';
        document.getElementById('display-name').textContent = currentUser;
        renderDashboard(); switchView('dashboard-view');
        syncFromCloud();
      } else alert("密碼錯誤！");
    }
    function handleLogout() { currentUser = null; switchView('login-view'); }
    function switchView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function switchTab(tabId) { 
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); event.target.classList.add('active');
      document.querySelectorAll('.module-content').forEach(c => c.classList.remove('active')); document.getElementById(`tab-${tabId}`).classList.add('active');
    }
    function openInstallModal() { document.getElementById('install-modal').classList.add('active'); }
    function closeInstallModal() { document.getElementById('install-modal').classList.remove('active'); }

    function renderDashboard() {
      const grid = document.getElementById('projects-grid'); const db = getDB();
      grid.innerHTML = db.slice().reverse().map(p => `
        <div class="project-card" onclick="openProject(${p.id})">
          <h3>📍 ${p.location}</h3>
          <p style="font-size: 14px; color: var(--text-muted);">${p.start} ~ ${p.end}</p>
        </div>
      `).join('');
    }

    function openProject(id) {
      currentProjectId = id; activeDayIndex = 0; const p = getCurProject();
      document.getElementById('project-title-display').textContent = `📍 ${p.location}`;
      const familyMembers = Object.keys(authRules).filter(k => (wsMap[k] || 'wei_family') === currentWorkspace);
      document.getElementById('exp-payer').innerHTML = familyMembers.map(m => `<option value="${m}">${m}</option>`).join('');
      renderItinerary(); renderBudget(); renderContacts(); switchView('detail-view');
    }

    function renderItinerary() {
      const p = getCurProject(); const start = new Date(p.start); const end = new Date(p.end);
      const totalDays = Math.floor((end - start) / 86400000) + 1;
      let daysHtml = '';
      for(let i=0; i<totalDays; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const count = (p.plans || []).filter(plan => plan.dayIdx === i).length;
        daysHtml += `<div class="day-btn ${i === activeDayIndex ? 'active' : ''}" onclick="activeDayIndex=${i};renderItinerary();">
          Day ${i+1} (${d.getMonth()+1}/${d.getDate()}) ${count > 0 ? `<span class="day-badge">${count}</span>` : ''}
        </div>`;
      }
      document.getElementById('day-buttons').innerHTML = daysHtml;
      const list = document.getElementById('plan-list');
      const dayPlans = (p.plans || []).filter(plan => plan.dayIdx === activeDayIndex).sort((a,b)=>a.time.localeCompare(b.time));
      list.innerHTML = dayPlans.map(plan => `
        <div class="card-panel" style="padding:15px; margin-bottom:10px;">
          <div style="display:flex; justify-content:space-between;">
            <div><span class="time-badge">${plan.time}</span> <strong>${plan.place}</strong></div>
            <span class="del-text" onclick="delPlan(${plan.id})">刪除</span>
          </div>
          <div class="creator-badge">由 ${plan.creator || '提議者'} 新增</div>
        </div>
      `).join('');
    }

    function addPlan() {
      const time = document.getElementById('plan-time').value; const place = document.getElementById('plan-place').value;
      if(!place) return; const p = getCurProject();
      if(!p.plans) p.plans = [];
      p.plans.push({ id: Date.now(), dayIdx: activeDayIndex, time, place, creator: currentUser });
      updateCurProject(p); renderItinerary();
    }
    function delPlan(id) { if(confirm("確定刪除？")) { const p = getCurProject(); p.plans = p.plans.filter(x => x.id !== id); updateCurProject(p); renderItinerary(); } }

    function addContact() {
      const name = document.getElementById('contact-name').value; const phone = document.getElementById('contact-phone').value;
      if(!name || !phone) return; const p = getCurProject();
      if(!p.contacts) p.contacts = [];
      p.contacts.push({ id: Date.now(), name, phone, creator: currentUser });
      updateCurProject(p); renderContacts();
    }
    function renderContacts() {
      const p = getCurProject(); const list = document.getElementById('contacts-list');
      list.innerHTML = (p.contacts || []).map(c => `
        <div class="card-panel flex-row" style="justify-content:space-between;">
          <div><strong>${c.name}</strong><br><a href="tel:${c.phone}" style="color:var(--primary);">${c.phone}</a></div>
          <span class="del-text" onclick="delContact(${c.id})">移除</span>
        </div>
      `).join('');
    }
    function delContact(id) { const p = getCurProject(); p.contacts = p.contacts.filter(x => x.id !== id); updateCurProject(p); renderContacts(); }

    function renderBudget() {
      const p = getCurProject(); const list = document.getElementById('expense-list'); let total = 0;
      (p.expenses || []).forEach(e => total += Number(e.cost));
      document.getElementById('total-expense').textContent = total.toLocaleString();
      list.innerHTML = (p.expenses || []).map(e => `
        <div class="list-item">
          <div><strong>${e.item}</strong><br><span class="creator-badge">${e.payer} 代墊</span></div>
          <div><strong>$${e.cost}</strong> <span class="del-text" style="margin-left:10px;" onclick="delExpense(${e.id})">×</span></div>
        </div>
      `).join('');
    }
    function addExpense() {
      const item = document.getElementById('exp-item').value; const cost = document.getElementById('exp-cost').value; const payer = document.getElementById('exp-payer').value;
      if(!item || !cost) return; const p = getCurProject();
      if(!p.expenses) p.expenses = [];
      p.expenses.push({ id: Date.now(), item, cost, payer });
      updateCurProject(p); renderBudget();
    }
    function delExpense(id) { const p = getCurProject(); p.expenses = p.expenses.filter(x => x.id !== id); updateCurProject(p); renderBudget(); }
  </script>
</body>
</html>
