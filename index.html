<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner | 旅遊規劃秘書</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --bg-color: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; -webkit-font-smoothing: antialiased; }

    /* Layout & Views */
    .view { display: none; min-height: 100vh; padding: 20px; }
    .view.active { display: block; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Login Screen */
    .login-container { max-width: 400px; margin: 10vh auto; background: var(--surface); padding: 30px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .login-header { text-align: center; margin-bottom: 30px; }
    .login-header h1 { color: var(--primary); font-size: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .form-control { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; transition: border-color 0.2s; }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: var(--primary-hover); }
    .error-msg { color: #ef4444; font-size: 14px; margin-top: -10px; margin-bottom: 15px; display: none; }

    /* Dashboard Header */
    .app-header { max-width: 800px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
    .user-info { font-weight: 600; font-size: 18px; }
    .logout-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; }

    /* Projects Grid */
    .projects-container { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    
    /* Project Card */
    .project-card { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
    .project-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .project-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    .project-dates { color: var(--text-muted); font-size: 14px; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
    .project-creator { font-size: 12px; background: var(--bg-color); padding: 4px 8px; border-radius: 4px; display: inline-block; color: var(--primary); font-weight: 500;}

    /* Add Project Button (The big +) */
    .add-project-card { display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; border: 2px dashed var(--border); color: var(--text-muted); min-height: 140px; }
    .add-project-card:hover { border-color: var(--primary); color: var(--primary); background: #f0f9ff; }
    .add-icon { font-size: 40px; font-weight: 300; margin-bottom: 10px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 90%; max-width: 400px; padding: 25px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .modal h2 { margin-bottom: 20px; font-size: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
    .btn-secondary { background: var(--bg-color); color: var(--text-main); }
  </style>
</head>
<body>

  <div id="login-view" class="view active">
    <div class="login-container">
      <div class="login-header">
        <h1>✈️ 旅遊規劃秘書</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">請選擇帳號並輸入密碼</p>
      </div>
      
      <div class="form-group">
        <label>使用者帳號</label>
        <select id="user-select" class="form-control">
          <optgroup label="家族帳號">
            <option value="魏嘉宏">魏嘉宏</option>
            <option value="魏卉姍">魏卉姍</option>
            <option value="魏敏軒">魏敏軒</option>
            <option value="魏珮芯">魏珮芯</option>
          </optgroup>
          <optgroup label="獨立專案">
            <option value="陳筱雙">陳筱雙</option>
          </optgroup>
        </select>
      </div>
      
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password-input" class="form-control" placeholder="請輸入專屬密碼">
      </div>
      
      <div id="login-error" class="error-msg">密碼錯誤，請重新輸入。</div>
      
      <button class="btn" onclick="handleLogin()">登入</button>
    </div>
  </div>

  <div id="dashboard-view" class="view">
    <div class="app-header">
      <div class="user-info">👋 歡迎，<span id="display-name"></span></div>
      <button class="logout-btn" onclick="handleLogout()">登出</button>
    </div>
    
    <div class="projects-container" id="projects-grid">
      </div>
  </div>

  <div id="add-modal" class="modal-overlay">
    <div class="modal">
      <h2>✨ 新增旅遊計畫</h2>
      <div class="form-group">
        <label>旅遊地點</label>
        <input type="text" id="trip-location" class="form-control" placeholder="例如：日本京都、台南輕旅行">
      </div>
      <div class="form-group">
        <label>出發日期</label>
        <input type="date" id="trip-start" class="form-control">
      </div>
      <div class="form-group">
        <label>結束日期</label>
        <input type="date" id="trip-end" class="form-control">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn" onclick="saveProject()">建立專案</button>
      </div>
    </div>
  </div>

  <script>
    // 狀態管理
    let currentUser = null;
    let currentWorkspace = null; // 'wei_family' 或 'chen_project'

    // 密碼設定
    const authRules = {
      '魏嘉宏': { pwd: '35195', workspace: 'wei_family' },
      '魏卉姍': { pwd: '35195', workspace: 'wei_family' },
      '魏敏軒': { pwd: '35195', workspace: 'wei_family' },
      '魏珮芯': { pwd: '35195', workspace: 'wei_family' },
      '陳筱雙': { pwd: '1206', workspace: 'chen_project' }
    };

    // 頁面切換邏輯
    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
    }

    // 登入邏輯
    function handleLogin() {
      const selectedUser = document.getElementById('user-select').value;
      const pwdInput = document.getElementById('password-input').value;
      const errorMsg = document.getElementById('login-error');

      if (authRules[selectedUser].pwd === pwdInput) {
        // 登入成功
        currentUser = selectedUser;
        currentWorkspace = authRules[selectedUser].workspace;
        errorMsg.style.display = 'none';
        document.getElementById('password-input').value = ''; // 清空密碼
        
        document.getElementById('display-name').textContent = currentUser;
        renderProjects();
        switchView('dashboard-view');
      } else {
        // 登入失敗
        errorMsg.style.display = 'block';
      }
    }

    // 登出邏輯
    function handleLogout() {
      currentUser = null;
      currentWorkspace = null;
      switchView('login-view');
    }

    // Modal 控制
    function openModal() { document.getElementById('add-modal').classList.add('active'); }
    function closeModal() { 
      document.getElementById('add-modal').classList.remove('active');
      // 清空表單
      document.getElementById('trip-location').value = '';
      document.getElementById('trip-start').value = '';
      document.getElementById('trip-end').value = '';
    }

    // 讀取/寫入 LocalStorage (模擬資料庫)
    function getProjects() {
      const data = localStorage.getItem(`travel_app_${currentWorkspace}`);
      return data ? JSON.parse(data) : [];
    }

    function saveProject() {
      const location = document.getElementById('trip-location').value;
      const start = document.getElementById('trip-start').value;
      const end = document.getElementById('trip-end').value;

      if(!location || !start || !end) {
        alert("請填寫完整資訊！");
        return;
      }

      const projects = getProjects();
      const newProject = {
        id: Date.now(),
        location: location,
        startDate: start,
        endDate: end,
        creator: currentUser // 紀錄是誰提議的
      };

      projects.push(newProject);
      localStorage.setItem(`travel_app_${currentWorkspace}`, JSON.stringify(projects));
      
      closeModal();
      renderProjects();
    }

    // 渲染專案卡片
    function renderProjects() {
      const grid = document.getElementById('projects-grid');
      const projects = getProjects();
      
      // 清空現有內容，並加入「新增按鈕」卡片
      grid.innerHTML = `
        <div class="project-card add-project-card" onclick="openModal()">
          <div class="add-icon">+</div>
          <div>新增旅遊計畫</div>
        </div>
      `;

      // 反向迴圈讓最新建立的在前面
      for (let i = projects.length - 1; i >= 0; i--) {
        const p = projects[i];
        const card = document.createElement('div');
        card.className = 'project-card';
        // 這裡預留點擊進入專案詳情的事件
        card.onclick = () => alert(`進入專案：${p.location}\n(即將開發：地圖區、行程區、住宿區)`);
        
        card.innerHTML = `
          <div class="project-title">📍 ${p.location}</div>
          <div class="project-dates">📅 ${p.startDate} ~ ${p.endDate}</div>
          <div class="project-creator">👤 提議者：${p.creator}</div>
        `;
        grid.appendChild(card);
      }
    }

    // 支援 Enter 鍵登入
    document.getElementById('password-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
