<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家族旅遊秘書 Pro</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅遊秘書">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --primary: #FF5A5F; --primary-hover: #E35156; --secondary: #00A699; --danger: #ff3b30;
      --bg-color: #F4F7FC; --surface: #ffffff; --text-main: #1A1A1A; --text-muted: #666666; 
      --border: #E4E8ED; --shadow: rgba(0, 0, 0, 0.06) 0px 8px 24px; --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; /* 防止拖曳時反白文字 */ }
    input, textarea, select { user-select: auto; } /* 允許輸入框反白 */
    body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding-bottom: 80px; }
    
    .view { display: none; min-height: 100vh; padding: 20px; max-width: 600px; margin: 0 auto; }
    .view.active { display: block; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .btn { padding: 14px 24px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 15px;}
    .btn:active { transform: scale(0.96); }
    .btn-small { padding: 8px 14px; font-size: 13px; border-radius: 10px; }
    .btn-action { background: var(--secondary); }
    .btn-outline { background: var(--surface); border: 1px solid var(--border); color: var(--text-main); }
    .form-control { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 16px; margin-bottom: 12px; background: #FAFBFC; transition: 0.2s; }
    .form-control:focus { border-color: var(--primary); outline: none; background: var(--surface); }
    
    .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .project-card { position: relative; background: var(--surface); padding: 22px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; cursor: pointer; border: 2px solid transparent; }
    .card-panel { background: var(--surface); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }
    .flex-row { display: flex; gap: 12px; align-items: center; }

    /* 支援滑鼠拖曳的容器 */
    .drag-scroll-container { margin: 0 -20px 20px -20px; padding: 0 20px 10px 20px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; cursor: grab; }
    .drag-scroll-container:active { cursor: grabbing; }
    .drag-scroll-container::-webkit-scrollbar { display: none; } /* 隱藏捲軸較美觀 */
    
    .tabs { display: inline-flex; background: #E9ECEF; border-radius: 14px; padding: 4px; }
    .tab { padding: 10px 18px; cursor: pointer; border-radius: 10px; font-weight: 600; color: var(--text-muted); font-size: 14px; }
    .tab.active { background: var(--surface); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .module-content { display: none; }
    .module-content.active { display: block; animation: fadeIn 0.2s; }

    .day-btn { display: inline-flex; align-items: center; padding: 10px 16px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; margin-right: 8px; font-weight: 600; color: var(--text-muted); }
    .day-btn.active { background: var(--text-main); color: white; border-color: var(--text-main); }
    /* 🔴 明顯的紅底白字徽章 */
    .day-badge { background: #ff3b30; color: #ffffff; border-radius: 12px; padding: 2px 8px; font-size: 12px; margin-left: 6px; font-weight: 800; box-shadow: 0 2px 4px rgba(255, 59, 48, 0.3); }
    
    .time-badge { background: #E8F4FD; color: #0284C7; padding: 6px 10px; border-radius: 8px; font-weight: 800; font-size: 14px; }
    .action-text { color: var(--secondary); cursor: pointer; font-size: 13px; font-weight: 700; background: #e8f4fd; padding: 6px 12px; border-radius: 8px; margin-right: 6px; }
    .del-text { color: var(--danger); cursor: pointer; font-size: 13px; font-weight: 700; background: #FFF0F0; padding: 6px 12px; border-radius: 8px; }
    .del-btn-card { position: absolute; top: 12px; right: 12px; background: #FFF0F0; color: var(--danger); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 10; }

    #map-container { height: 350px; width: 100%; border-radius: 12px; margin-top: 12px; z-index: 1; border: 1px solid var(--border); }

    /* 🔄 全局讀取動畫 */
    #global-loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(4px); }
    .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 提示小吐司 */
    #toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; display: none; z-index: 9999; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
    
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <div id="global-loader">
    <div class="spinner"></div>
    <h3 style="color: var(--text-main); font-weight: 800;">同步資料中...</h3>
    <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">請稍候片刻</p>
  </div>

  <div id="toast-msg">提示訊息</div>

  <div id="login-view" class="view active">
    <div style="margin-top: 10vh; text-align: center;">
      <h1 style="margin-bottom: 10px; font-weight: 800; color: var(--primary);">家族旅遊秘書 Pro</h1>
      <p style="color: var(--text-muted); margin-bottom: 30px; font-weight: 600;">專業自助旅行協作平台</p>
      
      <div class="card-panel" style="text-align: left;">
        <div class="flex-row" style="margin-bottom: 12px;">
            <select id="user-select" class="form-control" style="margin-bottom: 0; flex: 1;">
              </select>
            <button class="btn btn-action" style="padding: 14px;" onclick="addNewUser()" title="新增成員">➕</button>
        </div>
        <input type="password" id="password-input" class="form-control" placeholder="請輸入登入密碼" onkeypress="if(event.key === 'Enter') handleLogin()">
        <button class="btn" style="width: 100%; margin-top: 8px;" onclick="handleLogin()">進入系統</button>
      </div>
    </div>
  </div>

  <div id="dashboard-view" class="view">
    <div class="app-header">
      <h2 style="font-weight: 800;">👋 <span id="display-name"></span></h2>
      <button class="btn btn-outline btn-small" onclick="handleLogout()">登出</button>
    </div>
    <div class="projects-container" id="projects-grid"></div>
  </div>

  <div id="detail-view" class="view">
    <div class="detail-header" style="margin-bottom: 20px;">
      <button class="btn btn-outline btn-small" onclick="switchView('dashboard-view')">← 返回列表</button>
      <h2 id="project-title-display" style="font-size: 22px; font-weight: 800; margin-top: 12px;">載入中...</h2>
    </div>
    
    <div class="drag-scroll-container tabs-wrapper">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('itinerary')">📅 行程</div>
        <div class="tab" onclick="switchTab('map')">🗺️ 地圖</div>
        <div class="tab" onclick="switchTab('budget')">💰 分帳</div>
        <div class="tab" onclick="switchTab('contacts')">📞 電話</div>
        <div class="tab" onclick="switchTab('poll')">🗳️ 投票</div>
      </div>
    </div>

    <div id="tab-itinerary" class="module-content active">
      <div class="drag-scroll-container day-selector" id="day-buttons"></div>
      
      <div class="card-panel" id="itinerary-form-card" style="border: 2px solid var(--border);">
        <h4 id="form-title" style="margin-bottom: 12px;">➕ 新增行程</h4>
        <div class="flex-row">
          <input type="time" id="plan-time" class="form-control" style="flex: 1; margin: 0;" value="09:00">
          <input type="text" id="plan-place" class="form-control" style="flex: 2; margin: 0;" placeholder="景點名稱">
        </div>
        <button class="btn btn-action" id="save-plan-btn" style="width: 100%; margin-top: 12px;" onclick="addOrUpdatePlan()">儲存行程</button>
        <button class="btn btn-outline" id="cancel-edit-btn" style="width: 100%; margin-top: 8px; display: none;" onclick="cancelEdit()">取消編輯</button>
      </div>
      
      <div id="plan-list"></div>
    </div>

    <div id="tab-map" class="module-content">
      <div class="card-panel">
        <div class="flex-row">
          <input type="text" id="map-search-input" class="form-control" style="margin: 0;" placeholder="輸入地名搜尋...">
          <button class="btn" onclick="searchMap()">搜尋</button>
        </div>
        <div id="map-container"></div>
      </div>
    </div>

    <div id="tab-budget" class="module-content"><div class="card-panel"><h3 style="text-align:center;">此處為記帳模組</h3><p style="text-align:center; color:#888;">(保留先前功能)</p></div></div>
    <div id="tab-contacts" class="module-content"><div class="card-panel"><h3 style="text-align:center;">此處為聯絡人模組</h3><p style="text-align:center; color:#888;">(保留先前功能)</p></div></div>
    <div id="tab-poll" class="module-content"><div class="card-panel"><h3 style="text-align:center;">此處為投票模組</h3><p style="text-align:center; color:#888;">(保留先前功能)</p></div></div>
  </div>

  <div id="add-modal" class="modal-overlay">
    <div class="modal">
      <h2 style="margin-bottom: 20px;">✈️ 建立新旅程</h2>
      <input type="text" id="trip-location" class="form-control" placeholder="目的地">
      <input type="text" id="trip-date-range" class="form-control" placeholder="點擊選擇日期區間" readonly>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">取消</button>
        <button class="btn" style="flex:1;" onclick="createProject()">建立</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzXyfuSTyLZXBTQqcMjHglTu00nH2hua6uYKXNQWUbZB1BneeYGu52T56KFUCgJvR0/exec"; 
    
    // 💡 恢復原有的資料庫名稱，讓你的舊資料全數回歸！
    let currentWorkspace = 'FamilyTrip'; 
    let currentUser = null; 
    let currentProjectId = null; 
    let activeDayIndex = 0;
    let editingPlanId = null; // ✏️ 紀錄正在編輯的行程 ID
    let map = null; 
    
    // 預設與自訂成員管理
    let defaultUsers = { '魏嘉宏': '35195', '魏卉姍': '35195', '魏敏軒': '35195', '魏珮芯': '35195', '陳筱雙': '1206' };
    
    // 頁面載入時檢查是否已登入
    window.onload = () => {
        flatpickr("#trip-date-range", { mode: "range", minDate: "today", locale: "zh_tw" });
        initUserSelect();
        initDragScroll(); // 啟用滑鼠拖曳滾動功能
        
        // 自動登入判斷
        const savedUser = localStorage.getItem('family_trip_logged_user');
        if(savedUser) {
            document.getElementById('user-select').value = savedUser;
            currentUser = savedUser;
            document.getElementById('display-name').textContent = currentUser;
            switchView('dashboard-view');
            syncFromCloud(true); // 顯示全螢幕 loading
        }
    };

    // 初始化下拉選單
    function initUserSelect() {
        const customUsers = JSON.parse(localStorage.getItem('custom_users') || '{}');
        const allUsers = { ...defaultUsers, ...customUsers };
        const select = document.getElementById('user-select');
        select.innerHTML = Object.keys(allUsers).map(u => `<option value="${u}">👤 ${u}</option>`).join('');
    }

    // 動態新增成員
    function addNewUser() {
        const name = prompt("請輸入新成員名稱：");
        if(!name) return;
        const pwd = prompt(`請設定 ${name} 的登入密碼：`);
        if(!pwd) return;
        
        const customUsers = JSON.parse(localStorage.getItem('custom_users') || '{}');
        customUsers[name] = pwd;
        localStorage.setItem('custom_users', JSON.stringify(customUsers));
        initUserSelect();
        document.getElementById('user-select').value = name;
        showToast("✅ 成員新增成功！");
    }

    // 電腦版滑鼠拖曳滾動實作
    function initDragScroll() {
        const sliders = document.querySelectorAll('.drag-scroll-container');
        sliders.forEach(slider => {
            let isDown = false; let startX; let scrollLeft;
            slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
            slider.addEventListener('mouseleave', () => { isDown = false; });
            slider.addEventListener('mouseup', () => { isDown = false; });
            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2; // 滾動速度
                slider.scrollLeft = scrollLeft - walk;
            });
        });
    }

    function showLoader(show) { document.getElementById('global-loader').style.display = show ? 'flex' : 'none'; }
    function showToast(msg) { const el = document.getElementById('toast-msg'); el.textContent = msg; el.style.display = 'block'; setTimeout(()=>el.style.display='none', 2000); }

    function syncFromCloud(isInitial = false) {
      if(isInitial) showLoader(true);
      fetch(`${GAS_URL}?action=get&workspace=${currentWorkspace}&t=${Date.now()}`)
        .then(res => res.json())
        .then(data => {
            localStorage.setItem(`app_${currentWorkspace}`, JSON.stringify(data));
            if(currentProjectId) renderItinerary();
            renderDashboard();
            if(isInitial) showLoader(false);
        }).catch(() => {
            if(isInitial) showLoader(false);
            showToast("⚠️ 離線模式");
        });
    }

    function saveDB(data) { 
      localStorage.setItem(`app_${currentWorkspace}`, JSON.stringify(data)); 
      const fd = new URLSearchParams(); fd.append('action', 'save'); fd.append('workspace', currentWorkspace); fd.append('data', JSON.stringify(data));
      fetch(GAS_URL, { method: 'POST', body: fd.toString(), headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
    }

    function getDB() { return JSON.parse(localStorage.getItem(`app_${currentWorkspace}`) || '[]'); }
    function getCurProject() { return getDB().find(p => p.id === currentProjectId) || {}; }
    function updateCurProject(updatedP) { const db = getDB(); db[db.findIndex(p => p.id === currentProjectId)] = updatedP; saveDB(db); }

    function handleLogin() {
      const u = document.getElementById('user-select').value; 
      const p = document.getElementById('password-input').value;
      const customUsers = JSON.parse(localStorage.getItem('custom_users') || '{}');
      const allUsers = { ...defaultUsers, ...customUsers };

      if (allUsers[u] === p) {
        currentUser = u; 
        localStorage.setItem('family_trip_logged_user', u); // 記錄登入狀態
        document.getElementById('display-name').textContent = currentUser;
        document.getElementById('password-input').value = '';
        switchView('dashboard-view');
        syncFromCloud(true);
      } else alert("密碼錯誤！");
    }

    function handleLogout() {
        localStorage.removeItem('family_trip_logged_user');
        currentUser = null;
        switchView('login-view');
    }

    function switchView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function switchTab(tabId) { 
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); event.target.classList.add('active'); 
      document.querySelectorAll('.module-content').forEach(c => c.classList.remove('active')); document.getElementById(`tab-${tabId}`).classList.add('active'); 
      if (tabId === 'map') setTimeout(() => { if(!map){ map = L.map('map-container').setView([23.6, 120.9], 7); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); } map.invalidateSize(); }, 100);
    }
    
    function openModal() { document.getElementById('add-modal').classList.add('active'); }
    function closeModal() { document.getElementById('add-modal').classList.remove('active'); document.getElementById('trip-location').value = ''; document.getElementById('trip-date-range').value = ''; }

    function createProject() {
      const loc = document.getElementById('trip-location').value; const rawDate = document.getElementById('trip-date-range').value;
      const dates = rawDate.split(rawDate.includes('至') ? ' 至 ' : ' to ');
      if(!loc || dates.length !== 2) return alert("請完整填寫");
      const db = getDB(); db.push({ id: Date.now(), location: loc, start: dates[0], end: dates[1], plans: [] });
      saveDB(db); closeModal(); renderDashboard();
    }

    function renderDashboard() {
      const grid = document.getElementById('projects-grid'); const db = getDB();
      let html = `<div class="project-card" style="text-align:center; border: 2px dashed var(--border);" onclick="openModal()"><div style="font-size:30px; color:var(--primary);">+</div><div style="font-weight:700;">建立新旅程</div></div>`;
      db.slice().reverse().forEach(p => {
        html += `<div class="project-card" onclick="openProject(${p.id})">
            <button class="del-btn-card" onclick="delProject(${p.id}, event)">✕</button>
            <h3 style="margin-bottom: 8px;">📍 ${p.location}</h3><p style="font-size: 14px; color: var(--text-muted);">📅 ${p.start} ~ ${p.end}</p>
          </div>`;
      });
      grid.innerHTML = html;
    }

    function delProject(id, e) { e.stopPropagation(); if(confirm("確定刪除旅程？")) { const db = getDB().filter(p => p.id !== id); saveDB(db); renderDashboard(); } }

    function openProject(id) {
      currentProjectId = id; activeDayIndex = 0; const p = getCurProject();
      document.getElementById('project-title-display').textContent = `📍 ${p.location}`;
      renderItinerary(); switchView('detail-view'); switchTab('itinerary'); 
    }

    // --- 📅 行程核心 (支援編輯與上下排序) ---
    function renderItinerary() {
      const p = getCurProject(); if(!p.start) return; const start = new Date(p.start); const end = new Date(p.end);
      const totalDays = Math.floor((end - start) / 86400000) + 1;
      let daysHtml = '';
      for(let i=0; i<totalDays; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const count = (p.plans || []).filter(plan => plan.dayIdx === i).length;
        daysHtml += `<div class="day-btn ${i === activeDayIndex ? 'active' : ''}" onclick="activeDayIndex=${i}; cancelEdit(); renderItinerary();">
          Day ${i+1} (${d.getMonth()+1}/${d.getDate()}) ${count > 0 ? `<span class="day-badge">${count}</span>` : ''}
        </div>`;
      }
      document.getElementById('day-buttons').innerHTML = daysHtml;
      
      const list = document.getElementById('plan-list');
      // 注意：這裡不強制用時間排序，改用陣列原有順序，才能支援手動上下排序
      const dayPlans = (p.plans || []).filter(plan => plan.dayIdx === activeDayIndex);
      
      if(dayPlans.length === 0) list.innerHTML = `<div style="text-align:center; color:#ccc; padding:30px 0; font-weight:600;">尚無行程</div>`;
      else {
          list.innerHTML = dayPlans.map((plan, index) => `
            <div class="card-panel" style="padding:16px; margin-bottom:12px; border-left: 4px solid var(--primary);">
              <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                  <span class="time-badge">${plan.time}</span> <strong style="font-size:16px; margin-left:8px;">${plan.place}</strong>
                  ${plan.lat ? `<a href="https://www.google.com/maps/dir/?api=1&destination=${plan.lat},${plan.lng}" target="_blank" style="display:block; margin-top:8px; font-size:12px; color:white; text-decoration:none; background:var(--secondary); padding:4px 8px; border-radius:6px; width:fit-content;">🧭 Google導航</a>` : ''}
                </div>
                <div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; width:100px;">
                  ${index > 0 ? `<span class="action-text" style="padding:4px;" onclick="movePlan(${index}, -1)">▲</span>` : ''}
                  ${index < dayPlans.length - 1 ? `<span class="action-text" style="padding:4px;" onclick="movePlan(${index}, 1)">▼</span>` : ''}
                  <span class="action-text" onclick="startEditPlan(${plan.id})">✏️</span>
                  <span class="del-text" onclick="delPlan(${plan.id})">✕</span>
                </div>
              </div>
            </div>
          `).join('');
      }
    }

    // ✏️ 行程編輯模式切換
    function startEditPlan(id) {
        const p = getCurProject();
        const plan = p.plans.find(x => x.id === id);
        if(!plan) return;
        
        editingPlanId = id;
        document.getElementById('plan-time').value = plan.time;
        document.getElementById('plan-place').value = plan.place;
        
        document.getElementById('form-title').textContent = "✏️ 編輯行程";
        document.getElementById('save-plan-btn').textContent = "更新行程";
        document.getElementById('cancel-edit-btn').style.display = 'block';
        
        // 自動捲動到表單
        document.getElementById('itinerary-form-card').scrollIntoView({behavior: "smooth"});
    }

    function cancelEdit() {
        editingPlanId = null;
        document.getElementById('plan-place').value = '';
        document.getElementById('form-title').textContent = "➕ 新增行程";
        document.getElementById('save-plan-btn').textContent = "儲存行程";
        document.getElementById('cancel-edit-btn').style.display = 'none';
    }

    function addOrUpdatePlan(placeName = null, lat = null, lng = null) {
      const time = document.getElementById('plan-time').value; 
      const place = placeName || document.getElementById('plan-place').value;
      if(!place || !time) return alert("請輸入時間與景點名稱"); 
      
      const p = getCurProject(); if(!p.plans) p.plans = [];
      
      if (editingPlanId) {
          // 編輯模式
          const idx = p.plans.findIndex(x => x.id === editingPlanId);
          if(idx > -1) {
              p.plans[idx].time = time;
              p.plans[idx].place = place;
          }
          cancelEdit();
          showToast("✅ 更新成功");
      } else {
          // 新增模式
          p.plans.push({ id: Date.now(), dayIdx: activeDayIndex, time, place, lat, lng });
          showToast("✅ 已加入");
      }
      
      updateCurProject(p); 
      document.getElementById('plan-place').value = ''; 
      renderItinerary();
    }
    
    // ⬆️⬇️ 行程排序功能
    function movePlan(currentIndexInDay, direction) {
        const p = getCurProject();
        // 找出屬於當天的所有行程
        let dayPlans = p.plans.filter(plan => plan.dayIdx === activeDayIndex);
        let otherPlans = p.plans.filter(plan => plan.dayIdx !== activeDayIndex);
        
        // 陣列元素交換位置
        const targetIndex = currentIndexInDay + direction;
        if (targetIndex < 0 || targetIndex >= dayPlans.length) return;
        
        const temp = dayPlans[currentIndexInDay];
        dayPlans[currentIndexInDay] = dayPlans[targetIndex];
        dayPlans[targetIndex] = temp;
        
        // 組合回原陣列並儲存
        p.plans = [...otherPlans, ...dayPlans];
        updateCurProject(p);
        renderItinerary();
    }

    function delPlan(id) { if(confirm("確定刪除此行程？")) { const p = getCurProject(); p.plans = p.plans.filter(x => x.id !== id); updateCurProject(p); renderItinerary(); } }

    function searchMap() {
      const q = document.getElementById('map-search-input').value; if(!q) return;
      showToast("🔍 搜尋中...");
      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`)
        .then(res => res.json())
        .then(data => {
          if (data && data.length > 0) {
            const loc = data[0]; const lat = parseFloat(loc.lat); const lng = parseFloat(loc.lon);
            map.setView([lat, lng], 16);
            const name = loc.display_name.split(',')[0].replace(/'/g, "\\'");
            L.marker([lat, lng]).addTo(map).bindPopup(`
              <div style="text-align:center;">
                <strong style="display:block; margin-bottom:8px;">${name}</strong>
                <button class="btn btn-small" onclick="addOrUpdatePlan('${name}', ${lat}, ${lng}); switchTab('itinerary');">加到本日行程</button>
              </div>
            `).openPopup();
          } else alert("找不到該地點");
        });
    }
  </script>
</body>
</html>
